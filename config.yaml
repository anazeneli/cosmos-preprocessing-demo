# Studio 1: Data Processing
# Prepares datasets for Cosmos-Predict2.5 LoRA post-training

# Cosmos-Predict2.5 VideoDataset requirements
video:
  height: 704
  fps: 16
  min_frames: 94

preprocess:
  num_workers: 2

datasets:
  cosmos-nemo-assets:
    repo_id: "nvidia/Cosmos-NeMo-Assets"
    raw_dir: "data/raw/cosmos-nemo-assets"
    processed_dir: "/teamspace/lightning_storage/datasets/cosmos-nemo-assets"
    prompt: "A video of sks teal robot."

  # Example: add more datasets by name
